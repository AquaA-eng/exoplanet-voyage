<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Worlds Beyond Our Sun — NASA Exoplanet Explorer</title>
    <meta name="description" content="Explore 6,240 confirmed exoplanets with live NASA data. A field guide to worlds beyond our sun." />
  </head>
    <script>
      // Apply theme before first paint: saved choice, else system preference
      try {
        var t = localStorage.getItem('theme');
        if (t !== 'field-guide' && t !== 'deep-space') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'deep-space' : 'field-guide';
        }
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    </script>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
